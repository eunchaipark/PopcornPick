services:

  postgresql:
    image: ankane/pgvector:latest
    container_name: popcornpick_db
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  data_loader:
    build:
      context: .
      dockerfile: docker/Dockerfile.fastapi
    container_name: popcornpick_data_loader
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      postgresql:
        condition: service_healthy
    command: python db/load_data.py
    restart: "no"

  fastapi:
    build:
      context: .
      dockerfile: docker/Dockerfile.fastapi
    container_name: popcornpick_api
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgresql:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  spark:
    build:
      context: .
      dockerfile: docker/Dockerfile.spark
    container_name: popcornpick_spark
    env_file: .env
    environment:
      PYTHONUNBUFFERED: 1
    ports:
      - "4040:4040"
    volumes:
      - .:/app
    depends_on:
      postgresql:
        condition: service_healthy
    command: >
      bash -c "PYTHONPATH=/app python3 /app/realtime_log/streaming/genre_weight_stream.py &
               PYTHONPATH=/app python3 /app/batch_recommendation/batch_runner.py"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.react
    container_name: popcornpick_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - fastapi
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data: